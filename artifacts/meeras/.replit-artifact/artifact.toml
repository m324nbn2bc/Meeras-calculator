kind = "mobile"
previewPath = "/"
title = "Meeras Calculator"
version = "1.0.0"
id = "artifacts/meeras"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19447

[services.development]
run = "pnpm --filter @workspace/meeras run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meeras", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/meeras", "run", "serve" ]

[services.env]
PORT = "19447"
BASE_PATH = "/"
